<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="pcphone">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="pcphone">
  <meta name="theme-color" content="#08080c">
  <meta name="format-detection" content="telephone=no">
  <title>pcphone — Remote Desktop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Login / Register Overlay -->
  <div id="auth-overlay" class="auth-overlay" hidden>
    <div class="auth-card">
      <div class="auth-brand">pcphone</div>
      <div class="auth-subtitle" id="auth-subtitle">Sign in to control this PC</div>
      <form id="auth-form" autocomplete="off">
        <input id="auth-username" class="auth-input" type="text" placeholder="Username"
               autocapitalize="none" autocorrect="off" spellcheck="false" required>
        <input id="auth-password" class="auth-input" type="password" placeholder="Password"
               autocomplete="current-password" required>
        <div id="auth-error" class="auth-error" hidden></div>
        <button id="auth-submit" class="auth-submit" type="submit">Sign In</button>
      </form>
      <div class="auth-toggle">
        <span id="auth-toggle-text">No account?</span>
        <button id="auth-toggle-btn" type="button" class="auth-link">Create one</button>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="status-bar">
    <div class="status-left">
      <div id="connection-dot"></div>
      <span id="connection-text">Disconnected</span>
    </div>
    <div class="status-right">
      <div class="status-badge" id="fps-badge">
        <span class="badge-label">FPS</span>
        <span class="badge-value" id="fps-value">0</span>
      </div>
      <div class="status-badge" id="latency-badge">
        <span class="badge-label">MS</span>
        <span class="badge-value" id="latency-value">--</span>
      </div>
    </div>
  </div>

  <!-- Screen Container -->
  <div id="screen-container">
    <canvas id="screen-canvas"></canvas>
    <div id="no-signal">
      <div class="no-signal-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <div class="no-signal-text">Waiting for connection…</div>
    </div>
  </div>

  <!-- Hidden Keyboard Input -->
  <input type="text" id="keyboard-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Keyboard input">

  <!-- Special Keys Bar -->
  <div id="special-keys-bar">
    <div class="keys-scroll">
      <button class="key-btn modifier-key" data-key="ctrl">Ctrl</button>
      <button class="key-btn modifier-key" data-key="alt">Alt</button>
      <button class="key-btn modifier-key" data-key="shift">Shift</button>
      <button class="key-btn modifier-key" data-key="win">Win</button>
      <div class="key-separator"></div>
      <button class="key-btn action-key" data-key="Escape">Esc</button>
      <button class="key-btn action-key" data-key="Tab">Tab</button>
      <button class="key-btn action-key" data-key="Enter">Enter</button>
      <button class="key-btn action-key" data-key="Backspace">⌫</button>
      <button class="key-btn action-key" data-key="Delete">Del</button>
      <div class="key-separator"></div>
      <button class="key-btn action-key" data-key="ArrowUp">↑</button>
      <button class="key-btn action-key" data-key="ArrowDown">↓</button>
      <button class="key-btn action-key" data-key="ArrowLeft">←</button>
      <button class="key-btn action-key" data-key="ArrowRight">→</button>
      <div class="key-separator"></div>
      <button class="key-btn action-key" data-key="Home">Home</button>
      <button class="key-btn action-key" data-key="End">End</button>
      <button class="key-btn action-key" data-key="PageUp">PgUp</button>
      <button class="key-btn action-key" data-key="PageDown">PgDn</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button class="toolbar-btn" data-action="keyboard" id="btn-keyboard">
      <span class="toolbar-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h0M10 10h0M14 10h0M18 10h0M6 14h0M18 14h0M9 14h6"/></svg>
      </span>
      <span class="toolbar-label">Keys</span>
    </button>
    <button class="toolbar-btn" data-action="mouse" id="btn-mouse">
      <span class="toolbar-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l7.07 16.97 2.51-7.39 7.39-2.51L4 4z"/></svg>
      </span>
      <span class="toolbar-label">Mouse</span>
    </button>
    <button class="toolbar-btn" data-action="apps" id="btn-apps">
      <span class="toolbar-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      </span>
      <span class="toolbar-label">Apps</span>
    </button>
    <button class="toolbar-btn" data-action="clipboard" id="btn-clipboard">
      <span class="toolbar-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1H9V4z"/></svg>
      </span>
      <span class="toolbar-label">Clip</span>
    </button>
    <button class="toolbar-btn" data-action="files" id="btn-files">
      <span class="toolbar-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2.5h8a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      </span>
      <span class="toolbar-label">Files</span>
    </button>
    <button class="toolbar-btn" data-action="media" id="btn-media">
      <span class="toolbar-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></svg>
      </span>
      <span class="toolbar-label">Media</span>
    </button>
    <button class="toolbar-btn" data-action="settings" id="btn-settings">
      <span class="toolbar-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h10M18 6h2M4 12h2M10 12h10M4 18h7M15 18h5"/><circle cx="16" cy="6" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="13" cy="18" r="2"/></svg>
      </span>
      <span class="toolbar-label">Settings</span>
    </button>
  </div>

  <!-- Panel Overlay -->
  <div class="panel-overlay" id="panel-overlay"></div>

  <!-- Apps Panel -->
  <div class="panel" id="apps-panel">
    <div class="panel-header">
      <div class="panel-grabber"></div>
      <h3 class="panel-title">Applications</h3>
    </div>
    <div class="panel-body">
      <div id="apps-grid" class="apps-grid">
        <div class="apps-loading">Loading apps…</div>
      </div>
    </div>
  </div>

  <!-- Clipboard Panel -->
  <div class="panel" id="clipboard-panel">
    <div class="panel-header">
      <div class="panel-grabber"></div>
      <h3 class="panel-title">Clipboard</h3>
    </div>
    <div class="panel-body">
      <textarea id="clipboard-text" placeholder="Clipboard content will appear here…"></textarea>
      <div class="panel-actions">
        <button class="action-btn" id="clipboard-fetch">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11M7 10l5 5 5-5M5 20h14"/></svg>
          Copy from PC
        </button>
        <button class="action-btn accent" id="clipboard-send">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V9M7 14l5-5 5 5M5 4h14"/></svg>
          Send to PC
        </button>
      </div>
    </div>
  </div>

  <!-- Files Panel -->
  <div class="panel" id="files-panel">
    <div class="panel-header">
      <div class="panel-grabber"></div>
      <h3 class="panel-title">File Transfer</h3>
    </div>
    <div class="panel-body">
      <div class="file-upload-area">
        <input type="file" id="file-input" multiple hidden>
        <label for="file-input" class="file-upload-label">
          <span class="file-upload-icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
          </span>
          <span class="file-upload-text">Tap to select files</span>
        </label>
      </div>
      <div id="file-selected" class="file-selected" hidden>
        <span id="file-name" class="file-name"></span>
        <button class="action-btn accent" id="file-upload-btn">Upload</button>
      </div>
      <div class="progress-container" id="upload-progress-container" hidden>
        <div class="progress-bar">
          <div class="progress-fill" id="upload-progress-fill"></div>
        </div>
        <span class="progress-text" id="upload-progress-text">0%</span>
      </div>
      <div id="upload-status" class="upload-status"></div>
    </div>
  </div>

  <!-- Media Panel -->
  <div class="panel" id="media-panel">
    <div class="panel-header">
      <div class="panel-grabber"></div>
      <h3 class="panel-title">Media Controls</h3>
    </div>
    <div class="panel-body">
      <div class="media-controls">
        <div class="media-section">
          <div class="media-section-title">Volume</div>
          <div class="media-buttons-row">
            <button class="media-btn" data-media="volumeDown" aria-label="Volume down">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M17 10h4"/></svg>
            </button>
            <button class="media-btn" data-media="mute" aria-label="Mute">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M22 9l-6 6M16 9l6 6"/></svg>
            </button>
            <button class="media-btn" data-media="volumeUp" aria-label="Volume up">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 9a5 5 0 0 1 0 6M19 7a8 8 0 0 1 0 10"/></svg>
            </button>
          </div>
        </div>
        <div class="media-section">
          <div class="media-section-title">Playback</div>
          <div class="media-buttons-row">
            <button class="media-btn" data-media="prevTrack" aria-label="Previous track">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M18 18V6l-8.5 6L18 18z" fill="currentColor" stroke="none"/><path d="M6 6v12"/></svg>
            </button>
            <button class="media-btn large" data-media="playPause" aria-label="Play / pause">
              <svg viewBox="0 0 24 24"><path d="M7 4h3v16H7zM14 4h3v16h-3z"/></svg>
            </button>
            <button class="media-btn" data-media="nextTrack" aria-label="Next track">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6v12l8.5-6L6 6z" fill="currentColor" stroke="none"/><path d="M18 6v12"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="panel" id="settings-panel">
    <div class="panel-header">
      <div class="panel-grabber"></div>
      <h3 class="panel-title">Settings</h3>
    </div>
    <div class="panel-body">
      <div class="setting-group">
        <div class="setting-header">
          <label class="setting-label">Control Mode</label>
          <span class="setting-value" id="control-mode-value">Direct Touch</span>
        </div>
        <div class="mode-toggle-group">
          <button class="mode-btn active" id="btn-mode-touch" data-mode="touch">Direct Touch</button>
          <button class="mode-btn" id="btn-mode-trackpad" data-mode="trackpad">Trackpad</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-header">
          <label class="setting-label">PC Audio</label>
          <span class="setting-value" id="audio-status-value">Muted</span>
        </div>
        <div class="mode-toggle-group">
          <button class="mode-btn" id="btn-audio-unmute" data-audio="unmute">Unmute</button>
          <button class="mode-btn active" id="btn-audio-mute" data-audio="mute">Mute</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-header">
          <label class="setting-label">Stream Quality</label>
          <span class="setting-value" id="quality-value">90</span>
        </div>
        <input type="range" class="setting-slider" id="quality-slider" min="50" max="95" value="90">
        <div class="setting-range-labels">
          <span>Low</span><span>High</span>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-header">
          <label class="setting-label">Max FPS</label>
          <span class="setting-value" id="fps-setting-value">60</span>
        </div>
        <input type="range" class="setting-slider" id="fps-slider" min="15" max="60" value="60">
        <div class="setting-range-labels">
          <span>15</span><span>60</span>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-header">
          <label class="setting-label">Touch Sensitivity</label>
          <span class="setting-value" id="sensitivity-value">1.5</span>
        </div>
        <input type="range" class="setting-slider" id="sensitivity-slider" min="5" max="30" value="15" step="1">
        <div class="setting-range-labels">
          <span>Low</span><span>High</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="index.js"></script>
</body>
</html>
