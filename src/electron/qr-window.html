<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magical Newton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .window {
      width: 400px;
      height: 600px;
      background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .window::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 200px;
      background: radial-gradient(ellipse at 50% -50%, rgba(99,102,241,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Title Bar */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 8px;
      position: relative;
      z-index: 1;
    }

    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .titlebar-actions {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .titlebar-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .titlebar-btn:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
    }

    .titlebar-btn.close:hover {
      background: rgba(239,68,68,0.3);
      border-color: rgba(239,68,68,0.4);
      color: #ef4444;
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 24px 20px;
      position: relative;
      z-index: 1;
      overflow-y: auto;
    }

    /* Logo */
    .logo {
      font-size: 32px;
      margin-bottom: 2px;
    }

    .app-name {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }

    .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
    }

    /* QR Code */
    .qr-container {
      background: white;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.15);
      position: relative;
    }

    .qr-container img {
      width: 170px;
      height: 170px;
      display: block;
    }

    .qr-glow {
      position: absolute;
      inset: -2px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      z-index: -1;
      opacity: 0.5;
      filter: blur(8px);
      animation: qrGlow 3s ease-in-out infinite;
    }

    @keyframes qrGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    /* Tunnel badge */
    .tunnel-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .tunnel-badge.active {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.25);
    }
    .tunnel-badge.inactive {
      background: rgba(245,158,11,0.15);
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.25);
    }

    /* Connection Info */
    .connection-info {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 8px 12px;
      -webkit-app-region: no-drag;
      cursor: pointer;
      transition: all 0.2s;
    }

    .info-row:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(99,102,241,0.3);
    }

    .info-row.primary {
      border-color: rgba(99,102,241,0.3);
      background: rgba(99,102,241,0.08);
    }

    .info-label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 12px;
      font-weight: 500;
      color: #e2e8f0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      word-break: break-all;
    }

    .copy-hint {
      font-size: 9px;
      color: rgba(99,102,241,0.6);
      margin-left: 8px;
      flex-shrink: 0;
    }

    /* Status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-text {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .status-clients {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-left: auto;
    }

    /* Loading state */
    .loading-text {
      color: rgba(255,255,255,0.25);
      font-style: italic;
    }

    .error-text {
      color: #ef4444;
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(34,197,94,0.9);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 100;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span class="titlebar-title">Magical Newton</span>
      <div class="titlebar-actions">
        <button class="titlebar-btn minimize" id="btn-minimize" title="Minimize">─</button>
        <button class="titlebar-btn close" id="btn-close" title="Hide to Tray">✕</button>
      </div>
    </div>

    <div class="content">
      <div class="logo">🪄</div>
      <div class="app-name">Magical Newton</div>
      <div class="subtitle">Scan with your iPhone to connect</div>

      <div class="qr-container">
        <div class="qr-glow"></div>
        <img id="qr-image" src="" alt="QR Code">
      </div>

      <div class="tunnel-badge inactive" id="tunnel-badge">
        <span>⏳</span> <span id="tunnel-text">Starting tunnel...</span>
      </div>

      <div class="connection-info">
        <div class="info-row primary" id="primary-url-row" title="Click to copy" style="display:none;">
          <div>
            <div class="info-label">📡 Connect via (scan QR)</div>
            <div class="info-value" id="primary-url-value">Loading...</div>
          </div>
          <span class="copy-hint">copy</span>
        </div>
        <div class="info-row" id="local-url-row" title="Click to copy">
          <div>
            <div class="info-label">🏠 Local Network</div>
            <div class="info-value" id="local-url-value"><span class="loading-text">Loading...</span></div>
          </div>
          <span class="copy-hint">copy</span>
        </div>
        <div class="info-row" id="mdns-row" title="Click to copy">
          <div>
            <div class="info-label">📛 Local DNS</div>
            <div class="info-value" id="mdns-value"><span class="loading-text">Loading...</span></div>
          </div>
          <span class="copy-hint">copy</span>
        </div>
      </div>

      <div id="error-msg" class="error-text" style="display:none;"></div>

      <div class="status-bar">
        <div class="status-dot"></div>
        <span class="status-text">Server running</span>
        <span class="status-clients" id="clients-count">0 clients</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function copyToClipboard(text) {
      if (window.electronAPI) {
        window.electronAPI.setClipboard(text);
      }
      showToast('Copied to clipboard!');
    }

    // Load connection info with retry
    async function init() {
      let retries = 0;
      const maxRetries = 10;

      while (retries < maxRetries) {
        try {
          if (!window.electronAPI) {
            throw new Error('electronAPI not available');
          }

          const info = await window.electronAPI.getConnectionInfo();

          // Set QR code
          const qrImg = document.getElementById('qr-image');
          if (info.qrCode) {
            qrImg.src = info.qrCode;
          }

          // Local URL
          document.getElementById('local-url-value').textContent = info.url || 'N/A';
          document.getElementById('local-url-row').onclick = () => copyToClipboard(info.url);

          // mDNS
          document.getElementById('mdns-value').textContent = info.mdnsUrl || 'N/A';
          document.getElementById('mdns-row').onclick = () => copyToClipboard(info.mdnsUrl);

          // Tunnel URL
          const tunnelBadge = document.getElementById('tunnel-badge');
          const tunnelText = document.getElementById('tunnel-text');
          const primaryRow = document.getElementById('primary-url-row');

          if (info.tunnelUrl) {
            tunnelBadge.className = 'tunnel-badge active';
            tunnelText.textContent = 'Tunnel Active';
            tunnelBadge.querySelector('span').textContent = '🌐';

            primaryRow.style.display = '';
            document.getElementById('primary-url-value').textContent = info.tunnelUrl;
            primaryRow.onclick = () => copyToClipboard(info.tunnelUrl);
          } else {
            tunnelBadge.className = 'tunnel-badge inactive';
            tunnelText.textContent = 'Local Network Only';
            tunnelBadge.querySelector('span').textContent = '⚠️';

            // Use local URL as primary
            primaryRow.style.display = '';
            document.getElementById('primary-url-value').textContent = info.url;
            primaryRow.onclick = () => copyToClipboard(info.url);
          }

          document.getElementById('error-msg').style.display = 'none';
          return; // Success!

        } catch (err) {
          retries++;
          console.warn(`[QR Window] Init attempt ${retries}/${maxRetries} failed:`, err.message);

          if (retries >= maxRetries) {
            document.getElementById('error-msg').textContent = 'Failed to load connection info. Try restarting the app.';
            document.getElementById('error-msg').style.display = 'block';
          }

          // Wait before retry
          await new Promise(resolve => setTimeout(resolve, 1000));
        }
      }
    }

    let streamInstance = null;
    let videoElement = null;
    let canvasElement = null;
    let canvasContext = null;
    let isCapturing = false;
    let isEncoding = false;
    let screenInfo = null;
    let targetFps = 60;
    let captureWidth = 1920;
    let captureHeight = 1080;
    const rtcPeers = new Map();
    // Track which clients need JPEG fallback vs WebRTC
    const jpegFallbackClientIds = new Set();
    let captureSettings = {
      quality: 95,
      maxFps: 60,
      maxWidth: 3840,
      maxHeight: 2160
    };
    console.log('[Capture] Initial capture settings:', JSON.stringify(captureSettings));

    // Helper: forward renderer logs to main process console
    function log(msg) {
      console.log(msg);
      if (window.electronAPI && window.electronAPI.sendLog) {
        window.electronAPI.sendLog(msg);
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(value, max));
    }

    function normalizeCaptureSettings(settings = {}) {
      return {
        quality: clamp(Math.round(Number(settings.quality) || captureSettings.quality), 30, 95),
        maxFps: clamp(Math.round(Number(settings.maxFps) || captureSettings.maxFps), 5, 60),
        maxWidth: clamp(Math.round(Number(settings.maxWidth) || captureSettings.maxWidth), 640, 3840),
        maxHeight: clamp(Math.round(Number(settings.maxHeight) || captureSettings.maxHeight), 360, 2160)
      };
    }

    function even(value) {
      return Math.max(2, Math.floor(value / 2) * 2);
    }

    function getCaptureSize() {
      const sourceWidth = screenInfo?.width || captureSettings.maxWidth;
      const sourceHeight = screenInfo?.height || captureSettings.maxHeight;
      const scale = Math.min(1, captureSettings.maxWidth / sourceWidth, captureSettings.maxHeight / sourceHeight);

      return {
        width: even(sourceWidth * scale),
        height: even(sourceHeight * scale)
      };
    }

    function applyCaptureSettings(settings) {
      const previousSettings = { ...captureSettings };
      const previousFps = captureSettings.maxFps;
      captureSettings = normalizeCaptureSettings(settings);

      console.log('[Capture] Settings updated:', JSON.stringify(previousSettings), '->', JSON.stringify(captureSettings));

      if (isCapturing && previousFps !== captureSettings.maxFps && window.electronAPI) {
        console.log('[Capture] FPS changed from', previousFps, 'to', captureSettings.maxFps, '- restarting capture timer');
        window.electronAPI.startCaptureTimer(captureSettings.maxFps);
      }

      updateAllRTCSenderQuality();
    }

    function getRTCMaxBitrate() {
      const pixels = captureWidth * captureHeight;
      const qualityScale = captureSettings.quality / 95;
      // Discord-level bitrates: aggressive high quality for screen sharing
      let bitrate = 40000000; // 40 Mbps base for 1080p

      if (pixels > 2560 * 1440) {
        bitrate = 100000000; // 100 Mbps for 4K
      } else if (pixels > 1920 * 1080) {
        bitrate = 60000000;  // 60 Mbps for 1440p
      }

      const finalBitrate = Math.round(bitrate * qualityScale);
      console.log('[RTC] Calculated max bitrate:', (finalBitrate / 1000000).toFixed(1), 'Mbps for', captureWidth + 'x' + captureHeight, 'quality:', captureSettings.quality);
      return finalBitrate;
    }

    async function applyRTCSenderQuality(sender) {
      if (!sender || !sender.track) return;

      // Discord-style: force detail content hint for screen share quality
      sender.track.contentHint = 'detail';
      console.log('[RTC] Applying sender quality - track kind:', sender.track.kind, 'enabled:', sender.track.enabled);

      const params = sender.getParameters();
      // Maintain resolution but allow balanced FPS tradeoff
      params.degradationPreference = 'balanced';
      params.encodings = params.encodings && params.encodings.length > 0 ? params.encodings : [{}];
      
      const maxBitrate = getRTCMaxBitrate();
      params.encodings[0] = {
        ...params.encodings[0],
        maxBitrate: maxBitrate,
        maxFramerate: captureSettings.maxFps,
        scaleResolutionDownBy: 1,
        // Force no quality adaptation
        networkPriority: 'high',
        priority: 'high',
      };

      console.log('[RTC] Sender params:', JSON.stringify({
        degradationPreference: params.degradationPreference,
        maxBitrate: (maxBitrate / 1000000).toFixed(1) + ' Mbps',
        maxFramerate: captureSettings.maxFps,
        scaleResolutionDownBy: 1,
      }));

      try {
        await sender.setParameters(params);
        console.log('[RTC] Sender quality applied successfully');
      } catch (err) {
        console.warn('[RTC] Could not apply sender quality:', err.message);
        console.warn('[RTC] Error stack:', err.stack);
      }
    }

    function updateAllRTCSenderQuality() {
      for (const peer of rtcPeers.values()) {
        peer.getSenders().forEach((sender) => applyRTCSenderQuality(sender));
      }
    }

    function sendRTCToClient(message) {
      if (window.electronAPI && window.electronAPI.sendRTCToClient) {
        window.electronAPI.sendRTCToClient(message);
      }
    }

    function serializeRTCDescription(description) {
      return description ? { type: description.type, sdp: description.sdp } : null;
    }

    function serializeRTCIceCandidate(candidate) {
      if (!candidate) return null;
      if (typeof candidate.toJSON === 'function') return candidate.toJSON();

      return {
        candidate: candidate.candidate,
        sdpMid: candidate.sdpMid,
        sdpMLineIndex: candidate.sdpMLineIndex,
        usernameFragment: candidate.usernameFragment
      };
    }

    function closeRTCPeer(clientId) {
      const peer = rtcPeers.get(clientId);
      if (!peer) return;
      stopRTCStatsReporting(clientId);
      peer.close();
      rtcPeers.delete(clientId);
    }

    function closeAllRTCPeers() {
      for (const clientId of rtcPeers.keys()) {
        closeRTCPeer(clientId);
      }
    }

    function createRTCPeer(clientId) {
      log('[RTC] Creating peer for client: ' + clientId);
      closeRTCPeer(clientId);

      const peer = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });

      peer.onicecandidate = (event) => {
        if (event.candidate) {
          sendRTCToClient({ type: 'rtc-ice', clientId, candidate: serializeRTCIceCandidate(event.candidate) });
        }
      };

      peer.onconnectionstatechange = () => {
        log('[RTC] Peer ' + clientId + ' connection state: ' + peer.connectionState);
        if (['failed', 'closed'].includes(peer.connectionState)) {
          closeRTCPeer(clientId);
        } else if (peer.connectionState === 'connected') {
          log('[RTC] \u2705 Peer ' + clientId + ' CONNECTED - streaming at ' + captureWidth + 'x' + captureHeight);
          // Start periodic stats reporting for this peer
          startRTCStatsReporting(clientId, peer);
        }
      };

      peer.onicecandidateerror = (event) => {
        console.warn('[RTC] ICE error for', clientId, ':', event.errorCode, event.errorText);
      };

      if (streamInstance) {
        log('[RTC] Adding ' + streamInstance.getVideoTracks().length + ' video track(s) to peer ' + clientId);
        streamInstance.getVideoTracks().forEach((track) => {
          track.contentHint = 'detail';
          const sender = peer.addTrack(track, streamInstance);
          applyRTCSenderQuality(sender);
        });
      } else {
        log('[RTC] WARNING: No stream instance available for peer ' + clientId);
      }

      rtcPeers.set(clientId, peer);
      return peer;
    }

    // Periodic WebRTC stats reporting — logs to main console every 5s
    const rtcStatsIntervals = new Map();

    function startRTCStatsReporting(clientId, peer) {
      // Clear any existing interval for this client
      if (rtcStatsIntervals.has(clientId)) {
        clearInterval(rtcStatsIntervals.get(clientId));
      }

      const intervalId = setInterval(async () => {
        if (!peer || peer.connectionState !== 'connected') {
          clearInterval(intervalId);
          rtcStatsIntervals.delete(clientId);
          return;
        }

        try {
          const stats = await peer.getStats();
          let videoStats = null;
          let codecInfo = null;

          stats.forEach((report) => {
            if (report.type === 'outbound-rtp' && report.kind === 'video') {
              videoStats = report;
            }
            if (report.type === 'codec' && report.mimeType && report.mimeType.includes('video')) {
              codecInfo = report;
            }
          });

          if (videoStats) {
            const fps = videoStats.framesPerSecond || 0;
            const width = videoStats.frameWidth || 0;
            const height = videoStats.frameHeight || 0;
            const bytesSent = videoStats.bytesSent || 0;
            const framesEncoded = videoStats.framesEncoded || 0;
            const qLimit = videoStats.qualityLimitationReason || 'none';
            const codec = codecInfo ? codecInfo.mimeType : 'unknown';

            log('[WebRTC Stats] ' + clientId + ': ' + fps + ' FPS | ' + width + 'x' + height + ' | Codec: ' + codec + ' | Sent: ' + (bytesSent / 1024 / 1024).toFixed(1) + ' MB | Encoded: ' + framesEncoded + ' frames | Quality limit: ' + qLimit);
          }
        } catch (err) {
          // Stats collection failed, ignore
        }
      }, 5000);

      rtcStatsIntervals.set(clientId, intervalId);
    }

    function stopRTCStatsReporting(clientId) {
      if (rtcStatsIntervals.has(clientId)) {
        clearInterval(rtcStatsIntervals.get(clientId));
        rtcStatsIntervals.delete(clientId);
      }
    }

    // Prefer VP9 or H264 High profile for better screen share quality (like Discord)
    function preferHighQualityCodec(sdp) {
      // Boost b=AS bandwidth line if present, or add it
      const maxBitrateKbps = Math.round(getRTCMaxBitrate() / 1000);
      
      // Replace or add bandwidth line for video
      let modifiedSdp = sdp;
      if (modifiedSdp.includes('m=video')) {
        // Remove existing b= lines for video
        modifiedSdp = modifiedSdp.replace(/b=AS:\d+\r\n/g, '');
        // Add high bandwidth after m=video line
        modifiedSdp = modifiedSdp.replace(
          /(m=video .*\r\n)/,
          `$1b=AS:${maxBitrateKbps}\r\n`
        );
      }
      
      console.log('[RTC] SDP modified: max bandwidth set to', maxBitrateKbps, 'kbps');
      return modifiedSdp;
    }

    async function startRTCForClient(clientId) {
      if (!clientId || !streamInstance) {
        console.warn('[RTC] Cannot start for client', clientId, '- streamInstance:', !!streamInstance);
        return;
      }

      try {
        console.log(`[Stream] ========================================`);
        console.log(`[Stream] Starting WebRTC stream for ${clientId}`);
        console.log(`[Stream] Resolution: ${captureWidth}x${captureHeight}`);
        console.log(`[Stream] Quality: ${captureSettings.quality}, FPS: ${captureSettings.maxFps}`);
        console.log(`[Stream] ========================================`);
        
        const peer = createRTCPeer(clientId);
        await Promise.all(peer.getSenders().map((sender) => applyRTCSenderQuality(sender)));
        
        const offer = await peer.createOffer({ offerToReceiveVideo: false, offerToReceiveAudio: false });
        
        // Modify SDP for higher quality (Discord-style)
        const modifiedOffer = {
          type: offer.type,
          sdp: preferHighQualityCodec(offer.sdp),
        };
        
        await peer.setLocalDescription(modifiedOffer);
        console.log('[RTC] Offer created and set as local description, SDP length:', modifiedOffer.sdp.length);
        sendRTCToClient({ type: 'rtc-offer', clientId, offer: serializeRTCDescription(peer.localDescription) });
        console.log('[RTC] Offer sent to client', clientId);
      } catch (err) {
        console.error('[RTC] Failed to start peer:', err.message);
        console.error('[RTC] Error stack:', err.stack);
        closeRTCPeer(clientId);
      }
    }

    async function handleRTCSignal(message) {
      if (!message || !message.clientId) {
        console.warn('[RTC] Received signal without clientId:', JSON.stringify(message));
        return;
      }

      console.log('[RTC] Handling signal:', message.type, 'for client:', message.clientId);

      switch (message.type) {
        case 'rtc-client-connected':
        case 'rtc-ready':
          // New client — assume it needs JPEG until WebRTC is confirmed
          jpegFallbackClientIds.add(message.clientId);
          console.log('[RTC] Client', message.clientId, 'ready, needs JPEG fallback until WebRTC connects. JPEG clients:', jpegFallbackClientIds.size);
          ensureJpegTimerRunning();
          await startRTCForClient(message.clientId);
          break;

        case 'rtc-active':
          // Client confirmed WebRTC is working — stop sending JPEG to it
          jpegFallbackClientIds.delete(message.clientId);
          console.log('[RTC] ✅ Client', message.clientId, 'switched to WebRTC. JPEG clients remaining:', jpegFallbackClientIds.size);
          if (jpegFallbackClientIds.size === 0) {
            console.log('[Capture] 🚀 All clients on WebRTC — stopping JPEG encoding to free CPU');
            stopJpegTimer();
          }
          break;

        case 'rtc-answer': {
          const peer = rtcPeers.get(message.clientId);
          if (peer && message.answer && message.answer.type && message.answer.sdp) {
            console.log('[RTC] Processing answer from', message.clientId, '- SDP length:', message.answer.sdp.length);
            await peer.setRemoteDescription(new RTCSessionDescription(message.answer));
            console.log('[RTC] Remote description set for', message.clientId);
          } else {
            console.warn('[RTC] Invalid answer from', message.clientId, '- peer exists:', !!peer);
          }
          break;
        }
        case 'rtc-ice': {
          const peer = rtcPeers.get(message.clientId);
          if (peer && message.candidate && message.candidate.candidate) {
            console.log('[RTC] Adding ICE candidate for', message.clientId);
            await peer.addIceCandidate(new RTCIceCandidate(message.candidate));
          }
          break;
        }
        case 'rtc-client-disconnected':
          console.log('[RTC] Client', message.clientId, 'disconnected');
          jpegFallbackClientIds.delete(message.clientId);
          closeRTCPeer(message.clientId);
          if (jpegFallbackClientIds.size === 0 && rtcPeers.size === 0) {
            console.log('[Capture] No clients left, JPEG timer not needed');
            stopJpegTimer();
          }
          break;
        case 'rtc-fallback':
          console.log('[RTC] ⚠️ Client', message.clientId, 'fell back to JPEG fallback');
          jpegFallbackClientIds.add(message.clientId);
          closeRTCPeer(message.clientId);
          ensureJpegTimerRunning();
          break;
        default:
          console.log('[RTC] Unhandled signal type:', message.type);
          break;
      }
    }

    /** Start the JPEG capture timer if not already running */
    function ensureJpegTimerRunning() {
      if (isCapturing && window.electronAPI) {
        console.log('[Capture] Starting JPEG capture timer at', targetFps, 'FPS for', jpegFallbackClientIds.size, 'JPEG client(s)');
        window.electronAPI.startCaptureTimer(targetFps);
      }
    }

    /** Stop the JPEG capture timer (WebRTC streams continue independently) */
    function stopJpegTimer() {
      if (window.electronAPI) {
        window.electronAPI.stopCaptureTimer();
      }
    }

    // Custom cursor image (SVG)
    const cursorImg = new Image();
    cursorImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>';

    if (window.electronAPI) {
      window.electronAPI.onCaptureTick(() => {
        if (!isEncoding) captureNextFrame();
      });
    }

    let captureFrameCount = 0;
    let lastCaptureLog = Date.now();
    let totalCaptureTimeMs = 0;

    async function captureNextFrame() {
      if (!isCapturing || !videoElement || videoElement.paused || videoElement.ended) return;
      // Skip JPEG encoding entirely if no clients need it (all on WebRTC)
      if (jpegFallbackClientIds.size === 0) return;
      isEncoding = true;

      const frameStart = performance.now();

      try {
        canvasContext.drawImage(videoElement, 0, 0, captureWidth, captureHeight);
        
        // Draw native OS cursor manually
        if (screenInfo && window.electronAPI) {
          try {
            const cursor = await window.electronAPI.getCursorPosition();
            const scaleX = captureWidth / screenInfo.width;
            const scaleY = captureHeight / screenInfo.height;
            canvasContext.drawImage(cursorImg, cursor.x * scaleX, cursor.y * scaleY, 20, 20);
          } catch(e) {
            console.warn('[Capture] Cursor fetch error:', e.message);
          }
        }

        const jpegQuality = captureSettings.quality / 100;
        const blob = await new Promise(resolve => canvasElement.toBlob(resolve, 'image/jpeg', jpegQuality));
        
        if (blob && isCapturing) {
          const arrayBuffer = await blob.arrayBuffer();
          if (window.electronAPI && isCapturing) {
            window.electronAPI.sendFrame(arrayBuffer);
          }
          
          captureFrameCount++;
          totalCaptureTimeMs += (performance.now() - frameStart);
          
          // Log capture stats every 5 seconds
          const now = Date.now();
          if (now - lastCaptureLog >= 5000) {
            const avgMs = captureFrameCount > 0 ? (totalCaptureTimeMs / captureFrameCount).toFixed(1) : 0;
            console.log(`[Capture] Stats: ${captureFrameCount} frames in 5s | Avg encode: ${avgMs}ms | JPEG quality: ${jpegQuality} | Frame size: ${(arrayBuffer.byteLength / 1024).toFixed(1)} KB | Resolution: ${captureWidth}x${captureHeight}`);
            captureFrameCount = 0;
            totalCaptureTimeMs = 0;
            lastCaptureLog = now;
          }
        } else if (!blob) {
          console.warn('[Capture] toBlob returned null - encoding may have failed');
        }
      } catch (err) {
        console.error('[Capture Loop] Draw/Blob error:', err.message);
        console.error('[Capture Loop] Error stack:', err.stack);
      } finally {
        isEncoding = false;
      }
    }

    async function startScreenCapture() {
      if (isCapturing) {
        console.log('[Capture] Already capturing, skipping start');
        return;
      }
      isCapturing = true;
      console.log('[Capture] ========================================');
      console.log('[Capture] Starting screen capture...');
      console.log('[Capture] ========================================');
      
      try {
        if (window.electronAPI) {
          screenInfo = await window.electronAPI.getScreenInfo();
          console.log('[Capture] Screen info:', JSON.stringify(screenInfo));
        }

        const targetSize = getCaptureSize();
        captureWidth = targetSize.width;
        captureHeight = targetSize.height;
        console.log('[Capture] Display: logical ' + (screenInfo?.logicalWidth || '?') + 'x' + (screenInfo?.logicalHeight || '?') + ' @ ' + (screenInfo?.scaleFactor || 1) + 'x');
        console.log('[Capture] Capture resolution: ' + captureWidth + 'x' + captureHeight);
        console.log('[Capture] Settings:', JSON.stringify(captureSettings));

        const sourceId = await window.electronAPI.getPrimarySourceId();
        if (!sourceId) {
          throw new Error('No desktop source found');
        }
        console.log('[Capture] Source ID:', sourceId);

        const constraints = {
          audio: false,
          video: {
            mandatory: {
              chromeMediaSource: 'desktop',
              chromeMediaSourceId: sourceId,
              minWidth: captureWidth,
              maxWidth: captureWidth,
              minHeight: captureHeight,
              maxHeight: captureHeight,
              minFrameRate: 30,
              maxFrameRate: captureSettings.maxFps
            }
          }
        };
        log('[Capture] getUserMedia constraints: ' + JSON.stringify(constraints));

        streamInstance = await navigator.mediaDevices.getUserMedia(constraints);
        log('[Capture] Got media stream, tracks: ' + streamInstance.getTracks().length);

        streamInstance.getVideoTracks().forEach((track) => {
          track.contentHint = 'detail';
          const settings = track.getSettings();
          log('[Capture] Video track settings: ' + JSON.stringify(settings));
        });

        videoElement = document.createElement('video');
        videoElement.srcObject = streamInstance;
        videoElement.muted = true;
        videoElement.playsInline = true;

        canvasElement = document.createElement('canvas');
        canvasElement.width = captureWidth;
        canvasElement.height = captureHeight;
        canvasContext = canvasElement.getContext('2d', { alpha: false, desynchronized: true });
        canvasContext.imageSmoothingEnabled = false;
        canvasContext.imageSmoothingQuality = 'high';

        videoElement.onloadedmetadata = () => {
          videoElement.play();
          
          const track = streamInstance.getVideoTracks()[0];
          const settings = track.getSettings();
          targetFps = Math.min(captureSettings.maxFps, settings.frameRate || captureSettings.maxFps);
          
          log('[Capture] \u2705 Capture started successfully:');
          log('[Capture]   Resolution: ' + captureWidth + 'x' + captureHeight);
          log('[Capture]   Actual track FPS: ' + (settings.frameRate || 'unknown'));
          log('[Capture]   Target FPS: ' + targetFps);
          log('[Capture]   WebRTC bitrate: ' + Math.round(getRTCMaxBitrate() / 1000000) + ' Mbps');
          log('[Capture]   Track settings: ' + JSON.stringify(settings));
          
          if (window.electronAPI) {
            window.electronAPI.startCaptureTimer(targetFps);
          }
        };

        videoElement.onerror = (err) => {
          console.error('[Capture] Video element error:', err);
        };
      } catch (err) {
        console.error('[Capture] ❌ Failed to start screen capture:', err.message);
        console.error('[Capture] Error stack:', err.stack);
        isCapturing = false;
      }
    }

    function stopScreenCapture() {
      if (!isCapturing && !streamInstance) return; // Already stopped
      console.log('[Capture] Stopping screen capture...');
      console.log('[Capture] Active RTC peers:', rtcPeers.size);
      isCapturing = false;
      isEncoding = false;
      jpegFallbackClientIds.clear();
      if (window.electronAPI) {
        window.electronAPI.stopCaptureTimer();
      }
      if (streamInstance) {
        const trackCount = streamInstance.getTracks().length;
        streamInstance.getTracks().forEach(track => {
          console.log('[Capture] Stopping track:', track.kind, track.id);
          track.stop();
        });
        streamInstance = null;
        console.log('[Capture] Stopped', trackCount, 'track(s)');
      }
      closeAllRTCPeers();
      if (videoElement) {
        videoElement.pause();
        videoElement.srcObject = null;
        videoElement = null;
      }
      canvasElement = null;
      canvasContext = null;
      console.log('[Capture] Screen capture stopped');
    }

    // Window controls
    document.getElementById('btn-minimize').addEventListener('click', () => {
      if (window.electronAPI) window.electronAPI.minimizeWindow();
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      if (window.electronAPI) window.electronAPI.closeWindow();
    });

    // Start after a small delay to ensure preload is ready
    setTimeout(init, 500);

    // Listen for connection status updates to dynamically toggle capture
    if (window.electronAPI && window.electronAPI.onStatusUpdate) {
      window.electronAPI.onStatusUpdate((status) => {
        if (status.capture && status.capture.settings) {
          applyCaptureSettings(status.capture.settings);
        }

        // Update client count and server-reported FPS
        document.getElementById('clients-count').textContent =
          `${status.clients} client${status.clients !== 1 ? 's' : ''} · ${status.fps} FPS`;

        // Start/Stop capture based on client count
        if (status.clients > 0) {
          startScreenCapture().then(() => {
            (status.clientIds || []).forEach((clientId) => {
              if (!rtcPeers.has(clientId)) startRTCForClient(clientId);
            });
          });
        } else {
          stopScreenCapture();
        }
      });
    }

    if (window.electronAPI && window.electronAPI.onRTCSignal) {
      window.electronAPI.onRTCSignal((message) => {
        handleRTCSignal(message).catch((err) => {
          console.error('[RTC] Signal error:', err.message);
        });
      });
    }
  </script>
</body>
</html>
